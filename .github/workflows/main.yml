name: Daily Stock List Update

# 設定觸發條件：
# 1. schedule: 改為 08:30 UTC (等於台灣下午 16:30)
#    這樣可以直接抓到「當日」剛收盤的籌碼數據，不用等到隔天早上。
# 2. workflow_dispatch: 手動觸發按鈕
on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code (下載程式碼)
      uses: actions/checkout@v4

    - name: Set up Python (安裝 Python)
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies (安裝爬蟲套件)
      run: |
        pip install requests pandas lxml html5lib yfinance

    - name: Run generator (執行爬蟲)
      run: |
        python generator.py
        # python generator_test.py

    - name: Commit and Push if changed (更新資料庫)
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        
        # 🔥 請機器人把正式版(四大天王)與測試版(兩大特務)通通打包帶走！
        git add stock_list.json daily_recommendations.json left_side_value.json deposit_stocks.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update all stock JSONs " && git pull --rebase origin main && git push)
